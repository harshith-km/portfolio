<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        body{
            background-color: rgb(165, 165, 165);
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
        }
        .sliderWrapper{
            border: 2px solid blue;

            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .arrow{
            font-size: 3rem;
        }
        .arrow:hover{
            cursor: pointer;
        }
        .slider{
            width: 800px;
            height: 500px;
            background-color: white;

            overflow-x: hidden;
        }
        .frame{
            display: flex;
        }
        .frame img{
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
        <div class="sliderWrapper">
            <div class="arrow left" id="left">❮</div>
            <div class="slider">
                <div class="frame" id="frame">
                    <img src="./img/contentNest/CN-allblogs.png" alt="" id="image">
                    <img src="./img/contentNest/CN-analytics.png" alt="" id="image">
                    <img src="./img/contentNest/CN-chatting.png" alt="" id="image">
                    <img src="./img/contentNest/CN-chatwithuser.png" alt="" id="image">
                </div>
            </div>
            <div class="arrow right" id="right">❯</div>
        </div>

        <script>



            //image sliding
            const left = document.getElementById("left")
            const right = document.getElementById("right")
            const frame = document.getElementById("frame")
            const image = document.querySelectorAll("#image")
            let sliderPos = 0
                       
             right.addEventListener("click" , () =>{
                if(sliderPos >-((image.length-1) * 800) ){
                    sliderPos -= 800
                    frame.style.transform = `translateX(${sliderPos}px)`
                }else{
                    sliderPos = 0
                    frame.style.transform = `translateX(${sliderPos}px)`
                }
             })

             left.addEventListener("click" , () =>{
                if(sliderPos < 0){
                    sliderPos += 800
                    frame.style.transform = `translateX(${sliderPos}px)`
                }else{
                    sliderPos = -((image.length-1) * 800) 
                    frame.style.transform = `translateX(${sliderPos}px)`
                }
             })


        </script>
</body>
</html>
